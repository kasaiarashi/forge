name: GUI (Windows)

on:
  push:
    branches: [master, dev]
    paths:
      - 'gui/windows/**'
      - 'crates/forge-ffi/**'
      - '.github/workflows/gui.yml'
  pull_request:
    paths:
      - 'gui/windows/**'
      - 'crates/forge-ffi/**'
      - '.github/workflows/gui.yml'
  workflow_dispatch: {}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: sccache
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"

jobs:
  build:
    name: Build + Test Forge GUI
    runs-on: windows-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      # ─── Rust: build forge_ffi.dll ───
      - uses: mozilla-actions/sccache-action@v0.0.5
      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: gui-ffi-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Build forge-ffi (release)
        run: cargo build --release -p forge-ffi

      - name: Stage forge_ffi.dll for GUI
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path gui/windows/src/Forge.Gui.App/runtimes/win-x64/native | Out-Null
          Copy-Item target/release/forge_ffi.dll gui/windows/src/Forge.Gui.App/runtimes/win-x64/native/ -Force

      # ─── .NET / WinUI ───
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Restore
        working-directory: gui/windows
        run: dotnet restore

      - name: Build (Release | x64)
        working-directory: gui/windows
        run: msbuild Forge.Gui.sln /p:Configuration=Release /p:Platform=x64 /p:AppxPackageSigningEnabled=false /m

      - name: Run tests
        working-directory: gui/windows
        run: dotnet test -c Release -p:Platform=x64 --no-build --logger "trx;LogFileName=gui-tests.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gui-test-results
          path: gui/windows/**/TestResults/*.trx

      - name: Upload unsigned MSIX (PR/branch builds)
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: Forge.Gui.App-unsigned
          path: gui/windows/src/Forge.Gui.App/AppPackages/**/*.msix
          if-no-files-found: warn

  package-signed:
    name: Sign + Bundle MSIX
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: Forge.Gui.App-unsigned
          path: ./msix-unsigned
      # Signing step wired once code-signing cert is provisioned in repo
      # secrets as FORGE_SIGN_PFX_BASE64 + FORGE_SIGN_PFX_PASSWORD. Kept
      # as a gated no-op until then so tag pushes don't fail.
      - name: Sign MSIX (placeholder)
        if: env.FORGE_SIGN_PFX_BASE64 != ''
        env:
          FORGE_SIGN_PFX_BASE64: ${{ secrets.FORGE_SIGN_PFX_BASE64 }}
          FORGE_SIGN_PFX_PASSWORD: ${{ secrets.FORGE_SIGN_PFX_PASSWORD }}
        shell: pwsh
        run: |
          $pfx = "$env:RUNNER_TEMP\forge-sign.pfx"
          [System.IO.File]::WriteAllBytes($pfx, [System.Convert]::FromBase64String($env:FORGE_SIGN_PFX_BASE64))
          Get-ChildItem ./msix-unsigned -Filter *.msix -Recurse | ForEach-Object {
            & "C:\Program Files (x86)\Windows Kits\10\bin\x64\signtool.exe" sign `
              /f $pfx /p $env:FORGE_SIGN_PFX_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 $_.FullName
          }
      - uses: actions/upload-artifact@v4
        with:
          name: Forge.Gui.App-signed
          path: ./msix-unsigned/**/*.msix
