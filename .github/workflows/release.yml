name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── Build React UI (platform-independent) ───
  build-ui:
    name: Build Web UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: crates/forge-web/ui/package-lock.json

      - name: Build UI
        working-directory: crates/forge-web/ui
        run: npm ci && npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: forge-web-ui-dist
          path: crates/forge-web/ui/dist/

  # ─── Build forge CLI (Windows only) ───
  build-client:
    name: Build Client (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: arduino/setup-protoc@v3
        with:
          version: '27.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-client-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-client-

      - name: Build forge CLI
        run: cargo build --release --bin forge

      - uses: actions/upload-artifact@v4
        with:
          name: forge-windows-client
          path: target/release/forge.exe

  # ─── Build server binaries (all platforms) ───
  build-server:
    name: Build Server (${{ matrix.name }})
    needs: build-ui
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows x64
            artifact: forge-server-windows
            exe_suffix: .exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: Linux x64
            artifact: forge-server-linux-amd64
            exe_suffix: ''
          - os: macos-14
            target: x86_64-apple-darwin
            name: macOS x64
            artifact: forge-server-macos-amd64
            exe_suffix: ''
            cross: true
          - os: macos-14
            target: aarch64-apple-darwin
            name: macOS ARM64
            artifact: forge-server-macos-arm64
            exe_suffix: ''
    steps:
      - uses: actions/checkout@v4

      - uses: arduino/setup-protoc@v3
        with:
          version: '27.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.os }}-${{ matrix.target }}-cargo-server-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.os }}-${{ matrix.target }}-cargo-server-

      - name: Build server binaries
        run: cargo build --release --target ${{ matrix.target }} --bin forge-server --bin forge-web

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            target/${{ matrix.target }}/release/forge-server${{ matrix.exe_suffix }}
            target/${{ matrix.target }}/release/forge-web${{ matrix.exe_suffix }}

  # ─── Package and release ───
  release:
    name: Create Release
    needs: [build-client, build-server]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: forge-*

      - name: List artifacts
        run: Get-ChildItem -Recurse artifacts/ | Select-Object FullName
        shell: pwsh

      # ── Windows Client Installer ──
      - name: Build Windows Client Installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DAppVersion="${{ github.ref_name }}" `
            /DArtifactDir="..\..\artifacts" `
            /DPluginDir="..\..\plugin\ForgeSourceControl\Plugins\ForgeSourceControl" `
            installers\windows\forge-client.iss
        shell: pwsh

      # ── Windows Server Installer ──
      - name: Build Windows Server Installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DAppVersion="${{ github.ref_name }}" `
            /DArtifactDir="..\..\artifacts" `
            /DConfigDir="..\config" `
            installers\windows\forge-server.iss
        shell: pwsh

      # ── UE Plugin (Fab zips — one per engine version) ──
      # Stages the plugin source for Fab code-plugin submission.
      # Fab compiles the plugin from source, so Binaries/Intermediate/
      # Build/Saved are excluded — only .uplugin, Config, Content,
      # Resources, and Source are shipped. Each zip gets its own
      # EngineVersion stamped into the .uplugin.
      - name: Package UE Plugin (Fab zips)
        shell: pwsh
        run: |
          $plugin = "plugin\ForgeSourceControl\Plugins\ForgeSourceControl"
          $versions = @("5.1", "5.2", "5.3", "5.4", "5.5", "5.6", "5.7")
          foreach ($ver in $versions) {
            $stage = "staging\ForgeSourceControl-UE$ver\ForgeSourceControl"
            if (Test-Path "staging\ForgeSourceControl-UE$ver") { Remove-Item -Recurse -Force "staging\ForgeSourceControl-UE$ver" }
            New-Item -ItemType Directory -Force -Path $stage | Out-Null
            Copy-Item        "$plugin\ForgeSourceControl.uplugin" $stage
            Copy-Item -Recurse "$plugin\Config"    $stage
            Copy-Item -Recurse "$plugin\Content"   $stage
            Copy-Item -Recurse "$plugin\Resources" $stage
            Copy-Item -Recurse "$plugin\Source"    $stage
            # Stamp EngineVersion in the .uplugin for this build
            $uplugin = "$stage\ForgeSourceControl.uplugin"
            (Get-Content $uplugin -Raw) -replace '"EngineVersion":\s*"[^"]*"', "`"EngineVersion`": `"$ver`"" | Set-Content $uplugin -NoNewline
            $zip = "ForgeSourceControl-UE$ver-${{ github.ref_name }}.zip"
            if (Test-Path $zip) { Remove-Item $zip }
            Compress-Archive -Path "staging\ForgeSourceControl-UE$ver\ForgeSourceControl" -DestinationPath $zip
          }

      # ── UE Plugin (general download with pre-built binaries) ──
      # For direct install via the forge CLI client app. Includes
      # Source + Binaries so users don't need a UE build environment.
      # Pinned to UE 5.7 (latest).
      - name: Package UE Plugin (general download)
        shell: pwsh
        run: |
          $plugin = "plugin\ForgeSourceControl\Plugins\ForgeSourceControl"
          $stage  = "staging\ForgeSourceControl-general\ForgeSourceControl"
          if (Test-Path "staging\ForgeSourceControl-general") { Remove-Item -Recurse -Force "staging\ForgeSourceControl-general" }
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item        "$plugin\ForgeSourceControl.uplugin" $stage
          Copy-Item -Recurse "$plugin\Config"    $stage
          Copy-Item -Recurse "$plugin\Content"   $stage
          Copy-Item -Recurse "$plugin\Resources" $stage
          Copy-Item -Recurse "$plugin\Source"    $stage
          Copy-Item -Recurse "$plugin\Binaries"  $stage
          # Stamp EngineVersion to 5.7
          $uplugin = "$stage\ForgeSourceControl.uplugin"
          (Get-Content $uplugin -Raw) -replace '"EngineVersion":\s*"[^"]*"', '"EngineVersion": "5.7"' | Set-Content $uplugin -NoNewline
          $zip = "ForgeSourceControl-${{ github.ref_name }}.zip"
          if (Test-Path $zip) { Remove-Item $zip }
          Compress-Archive -Path "staging\ForgeSourceControl-general\ForgeSourceControl" -DestinationPath $zip

      # ── Linux x64 tar.gz ──
      - name: Package Linux x64
        shell: bash
        run: |
          mkdir -p staging/forge-server-linux-amd64
          cp artifacts/forge-server-linux-amd64/forge-server staging/forge-server-linux-amd64/
          cp artifacts/forge-server-linux-amd64/forge-web    staging/forge-server-linux-amd64/
          cp -r artifacts/forge-web-ui-dist                  staging/forge-server-linux-amd64/ui
          cp installers/config/forge-server.toml             staging/forge-server-linux-amd64/
          cp installers/config/forge-web.toml                staging/forge-server-linux-amd64/
          cp installers/linux/install.sh                     staging/forge-server-linux-amd64/
          chmod +x staging/forge-server-linux-amd64/forge-server
          chmod +x staging/forge-server-linux-amd64/forge-web
          chmod +x staging/forge-server-linux-amd64/install.sh
          cd staging && tar czf ../forge-server-linux-amd64.tar.gz forge-server-linux-amd64

      # ── macOS x64 tar.gz ──
      - name: Package macOS x64
        shell: bash
        run: |
          mkdir -p staging/forge-server-macos-amd64
          cp artifacts/forge-server-macos-amd64/forge-server staging/forge-server-macos-amd64/
          cp artifacts/forge-server-macos-amd64/forge-web    staging/forge-server-macos-amd64/
          cp -r artifacts/forge-web-ui-dist                  staging/forge-server-macos-amd64/ui
          cp installers/config/forge-server.toml             staging/forge-server-macos-amd64/
          cp installers/config/forge-web.toml                staging/forge-server-macos-amd64/
          cp installers/macos/install.sh                     staging/forge-server-macos-amd64/
          chmod +x staging/forge-server-macos-amd64/forge-server
          chmod +x staging/forge-server-macos-amd64/forge-web
          chmod +x staging/forge-server-macos-amd64/install.sh
          cd staging && tar czf ../forge-server-macos-amd64.tar.gz forge-server-macos-amd64

      # ── macOS ARM64 tar.gz ──
      - name: Package macOS ARM64
        shell: bash
        run: |
          mkdir -p staging/forge-server-macos-arm64
          cp artifacts/forge-server-macos-arm64/forge-server staging/forge-server-macos-arm64/
          cp artifacts/forge-server-macos-arm64/forge-web    staging/forge-server-macos-arm64/
          cp -r artifacts/forge-web-ui-dist                  staging/forge-server-macos-arm64/ui
          cp installers/config/forge-server.toml             staging/forge-server-macos-arm64/
          cp installers/config/forge-web.toml                staging/forge-server-macos-arm64/
          cp installers/macos/install.sh                     staging/forge-server-macos-arm64/
          chmod +x staging/forge-server-macos-arm64/forge-server
          chmod +x staging/forge-server-macos-arm64/forge-web
          chmod +x staging/forge-server-macos-arm64/install.sh
          cd staging && tar czf ../forge-server-macos-arm64.tar.gz forge-server-macos-arm64

      # ── Prepare raw binaries for self-updater ──
      - name: Prepare raw binaries
        shell: bash
        run: |
          # Client binaries
          cp artifacts/forge-windows-client/forge.exe forge-windows-x64.exe

          # Server + Web binaries (Windows)
          cp artifacts/forge-server-windows/forge-server.exe forge-server-windows-x64.exe
          cp artifacts/forge-server-windows/forge-web.exe    forge-web-windows-x64.exe

          # Server + Web binaries (Linux)
          cp artifacts/forge-server-linux-amd64/forge-server forge-server-linux-x64
          cp artifacts/forge-server-linux-amd64/forge-web    forge-web-linux-x64

          # Server + Web binaries (macOS x64)
          cp artifacts/forge-server-macos-amd64/forge-server forge-server-macos-x64
          cp artifacts/forge-server-macos-amd64/forge-web    forge-web-macos-x64

          # Server + Web binaries (macOS ARM64)
          cp artifacts/forge-server-macos-arm64/forge-server forge-server-macos-arm64
          cp artifacts/forge-server-macos-arm64/forge-web    forge-web-macos-arm64

      # ── Create GitHub Release ──
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            installers/windows/Output/ForgeClient-Windows-x64-Setup.exe
            installers/windows/Output/ForgeServer-Windows-x64-Setup.exe
            forge-server-linux-amd64.tar.gz
            forge-server-macos-amd64.tar.gz
            forge-server-macos-arm64.tar.gz
            ForgeSourceControl-UE5.1-${{ github.ref_name }}.zip
            ForgeSourceControl-UE5.2-${{ github.ref_name }}.zip
            ForgeSourceControl-UE5.3-${{ github.ref_name }}.zip
            ForgeSourceControl-UE5.4-${{ github.ref_name }}.zip
            ForgeSourceControl-UE5.5-${{ github.ref_name }}.zip
            ForgeSourceControl-UE5.6-${{ github.ref_name }}.zip
            ForgeSourceControl-UE5.7-${{ github.ref_name }}.zip
            ForgeSourceControl-${{ github.ref_name }}.zip
            forge-windows-x64.exe
            forge-server-windows-x64.exe
            forge-web-windows-x64.exe
            forge-server-linux-x64
            forge-web-linux-x64
            forge-server-macos-x64
            forge-web-macos-x64
            forge-server-macos-arm64
            forge-web-macos-arm64

  # ─── Build & push Docker images (reuses build-server linux + build-ui) ───
  docker:
    name: Docker (${{ matrix.image }})
    needs: [build-server, build-ui]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: forge-server
            target: forge-server
          - image: forge-web
            target: forge-web
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux server artifacts
        uses: actions/download-artifact@v4
        with:
          name: forge-server-linux-amd64
          path: dist/

      - name: Download UI artifacts
        uses: actions/download-artifact@v4
        with:
          name: forge-web-ui-dist
          path: dist/ui/

      - name: Make binaries executable
        run: chmod +x dist/forge-server dist/forge-web

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
