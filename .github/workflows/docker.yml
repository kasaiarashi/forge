name: Docker

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  # ── Build artifacts (Linux amd64) ──────────────────────────
  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: arduino/setup-protoc@v3
        with:
          version: '27.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-docker-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-cargo-docker-

      - name: Build Rust binaries
        run: cargo build --release --bin forge-server --bin forge-web

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: crates/forge-web/ui/package-lock.json

      - name: Build Web UI
        working-directory: crates/forge-web/ui
        run: npm ci && npm run build

      - name: Collect dist
        run: |
          mkdir -p dist/ui
          cp target/release/forge-server dist/forge-server
          cp target/release/forge-web    dist/forge-web
          cp -r crates/forge-web/ui/dist/* dist/ui/

      - uses: actions/upload-artifact@v4
        with:
          name: docker-dist
          path: dist/

  # ── Build & push Docker images ─────────────────────────────
  docker:
    name: Push ${{ matrix.image }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: forge-server
            target: forge-server
          - image: forge-web
            target: forge-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: docker-dist
          path: dist/

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
