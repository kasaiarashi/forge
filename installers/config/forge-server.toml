# Forge Server Configuration
# ========================

[server]
# Address and port to listen on. Bind to 0.0.0.0 to expose the server on
# the network — the [server.tls] block below keeps the connection
# encrypted by default.
listen = "0.0.0.0:9876"

# Maximum size per gRPC message in bytes. Default 256 MiB.
# This is per-message, NOT total push size — push streams are unlimited.
# Objects are chunked by FastCDC so individual messages are typically small.
max_message_size = 268435456

# Worker threads. 0 = auto (all CPU cores).
workers = 0

# TLS is ON by default. On first start, forge-server generates a local CA
# under <storage.base_path>/certs/, mints a leaf certificate covering the
# hostnames below (plus localhost / 127.0.0.1 / ::1 / every non-loopback
# interface IP automatically), and prints the CA SHA-256 fingerprint to
# the logs.
#
# Distribute to clients by running `forge login --server https://<this-server>:9876`
# from each client; the CLI's trust-on-first-use flow shows the CA
# fingerprint and pins it once confirmed.
#
# Already have a real cert (Let's Encrypt, corporate CA)? Set
# `auto_generate = false` and point cert_path/key_path at your PEM files.
[server.tls]
auto_generate = true
# Extra hostnames / IPs to embed in the leaf cert SAN. Loopback and every
# detected interface IP are added implicitly; this list is for DNS names
# (or IPs that aren't on a local interface, e.g. a public NAT mapping).
# hostnames = ["forge.internal", "203.0.113.10"]
# cert_path = "./forge-data/certs/server.crt"
# key_path  = "./forge-data/certs/server.key"

[actions]
# DANGER: workflow steps run as arbitrary shell commands on THIS machine
# as the forge-server process user. Anyone with a repo:admin role on any
# repo can author a workflow that executes code on the host. The engine
# is DISABLED by default — enable it only in dedicated, isolated
# deployments running under an unprivileged service account.
enabled = false

[storage]
# Base directory for all repository data.
# Each repo is stored in: <base_path>/repos/<repo-name>/objects/
base_path = "./forge-data"

# SQLite database path (relative to base_path, or absolute).
# Stores refs (branch tips), users, sessions, PATs, and lock metadata.
db_path = "forge.db"

# Per-repo overrides (optional).
# Useful for placing large repos on a different disk.
#
# [repos.my-game]
# path = "D:/fast-ssd/my-game"
# description = "Main game project"
#
# [repos.art-assets]
# path = "E:/large-hdd/art-assets"
# description = "Art asset repository (large storage)"
