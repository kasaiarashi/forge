# Forge Web UI Configuration
# =========================

[web]
# Address and port for the web UI.
listen = "0.0.0.0:3000"

# Path to the built React UI assets.
static_dir = "./ui"

[server]
# gRPC URL of the forge-server instance.
grpc_url = "http://localhost:9876"

[auth]
# bcrypt hash of the admin password.
# Generate with: forge-web hash-password <password>
# Leave empty to disable authentication.
admin_password_hash = ""

# Secret used to sign JWT tokens. CHANGE THIS to a random string!
jwt_secret = "change-me-to-random-string"

# How long login tokens last, in hours.
token_ttl_hours = 24
