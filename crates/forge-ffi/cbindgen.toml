# cbindgen configuration for forge-ffi.
#
# The output header is committed under `include/forge_ffi.h` so the
# Unreal Engine plugin (which doesn't build Rust) can pick it up
# directly. Regeneration happens on every `cargo build` via build.rs.

language = "C"
cpp_compat = true
pragma_once = true
documentation = true
line_length = 100
tab_width = 4
style = "both"

include_guard = "FORGE_FFI_H"
autogen_warning = "/* Generated by cbindgen from forge-ffi — do not edit. */"

[export]
prefix = ""

[parse]
parse_deps = false
