[workspace]
members = [
    "crates/forge-core",
    "crates/forge-cli",
    "crates/forge-server",
    "crates/forge-proto",
    "crates/forge-ignore",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"

[workspace.dependencies]
# Hashing
blake3 = "1"
# Chunking
fastcdc = "3"
# Compression
zstd = "0.13"
# Serialization
serde = { version = "1", features = ["derive"] }
bincode = "1"
serde_json = "1"
# gRPC
tonic = "0.12"
prost = "0.13"
tonic-build = "0.12"
# Async
tokio = { version = "1", features = ["full"] }
# CLI
clap = { version = "4", features = ["derive"] }
# Error handling
thiserror = "2"
anyhow = "1"
# Logging
tracing = "0.1"
tracing-subscriber = "0.3"
# Time
chrono = { version = "0.4", features = ["serde"] }
# Misc
uuid = { version = "1", features = ["v4", "serde"] }
hex = "0.4"
walkdir = "2"
globset = "0.4"
bytes = "1"
# Database
rusqlite = { version = "0.32", features = ["bundled"] }
# Internal
forge-core = { path = "crates/forge-core" }
forge-proto = { path = "crates/forge-proto" }
forge-ignore = { path = "crates/forge-ignore" }
tempfile = "3"
